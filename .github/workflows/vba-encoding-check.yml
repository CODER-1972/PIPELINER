name: VBA Encoding Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  vba-encoding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate VBA encoding hygiene
        run: python scripts/check_vba_encoding.py
